services:

  # ── BACKEND FORA DO DOCKER (roda direto no Windows com GPU) ─────────────────
  # Execute manualmente:
  #   cd backend && python main.py
  # ─────────────────────────────────────────────────────────────────────────────

  frontend:
    build: ./frontend
    ports:
      - "5174:5174"
    environment:
      # host.docker.internal aponta para o Windows host — onde o backend roda com GPU
      - BACKEND_URL=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── COMPOSE COMPLETO (VPS Linux com nvidia-container-toolkit) ────────────────
