<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>MoviePy Floating Preview</title>
  <link rel="stylesheet" href="sidepanel.css">
  <style>
    body {
      padding: 0;
      margin: 0;
      background: #040408;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    .preview-area {
      margin-top: 0;
      border-top: none;
      padding-top: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }
    .live-preview-container {
      width: 337px;
      height: 600px;
      border: 2px solid var(--brand-violet);
      box-shadow: 0 0 25px rgba(139, 92, 246, 0.5);
    }
    .live-preview-title {
      font-size: 18px !important;
    }
    .live-preview-item {
      font-size: 13px !important;
    }
    .live-preview-items-list {
      gap: 24px !important;
    }
  </style>
</head>
<body>
  <div class="preview-area">
    <div class="live-preview-container" id="livePreviewContainer">
      <!-- gradient background -->
      <div class="live-preview-bg"></div>
      <!-- YouTube Fallback Thumbnail -->
      <img id="livePreviewFallback" src="" alt="Thumbnail" class="live-preview-fallback" />
      <!-- HD Frame from Backend -->
      <img id="livePreviewFrame" src="" alt="Video Frame" class="live-preview-frame" style="opacity: 0;" />
      <!-- Overlay mask -->
      <img id="livePreviewOverlay" src="" alt="Overlay" class="live-preview-overlay" style="display: none;" />
      <!-- General Title -->
      <div id="livePreviewTitle" class="live-preview-title" style="font-size: 13px;"></div>
      <!-- Rankings Item List Overlay -->
      <div id="livePreviewItemsList" class="live-preview-items-list" style="gap: 16px;"></div>
    </div>
  </div>
  <script src="preview.js"></script>
</body>
</html>
